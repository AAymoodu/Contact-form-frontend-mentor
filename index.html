<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

    <title>Frontend Mentor | Contact form</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }

      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <section class="success">
      <div class="success-header">
        <img src="./assets/images/icon-success-check.svg" alt="">
        <h2>Message Sent!</h2>
      </div>
      <p>Thanks for completing the form. We'll be in touch soon!</p>
    </section>

    <!-- form creation starts here 👇 -->
     
    <section class="container">
      <h1>Contact Us</h1>
      <form id="form">
        <div class="name-wrapper">
          <div class="name">
            <label for="">First Name</label>
            <input type="text" class="firstname">
            <p class="error firstname-err"></p>
          </div>
          <div class="name">
            <label for="">Last Name</label>
            <input type="text" class="lastname">
            <p class="error lastname-err"></p>
          </div>
        </div>
        <label for="">Email Address</label>
        <input type="email" class="email">
        <p class="error email-err"></p>

        <label for="">Query Type</label>
        <div class="query-type">
          <div class="query">

            <button type="button" id="query-button1">
              <span>
                <img src="./assets/images/icon-radio-selected.svg" alt="">
              </span>
              General Enquiry
            </button>
          </div>
          <div class="query">
            <button type="button" id="query-button2">
              <span>
                <img src="./assets/images/icon-radio-selected.svg" alt="">
              </span>
              Support Request
            </button>
          </div>
        </div>
        <p class="error button-err"></p>

        <label for="">Message</label>
        <textarea class="message"></textarea>
        <p class="error message-err"></p>


        <div class="consent">
          <div class="consent-click">
            <img  src="./assets/images/icon-checkbox-check.svg" alt="">
          </div>
          <p>I consent to being contacted by the team</p>
        </div>
        <p class="error consent-err"></p>

        <input type="submit" value="Submit">
      </form>
    </section>





<!--     
    This field is required


    Please select a query type

    Message Sent!
    Thanks for completing the form. We'll be in touch soon! -->

      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
    <script src="./app.js"></script>
  </body>

</html>
